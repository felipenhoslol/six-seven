<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Detector Gesto 67</title>
    <!-- Fonte moderna e minimalista do Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        :root {
            --cor-primaria: #00e5ff;
            --cor-secundaria: #ff3d00;
            --cor-ok: #00e676;
            --fundo-hud: rgba(20, 20, 25, 0.65);
            --borda-hud: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: radial-gradient(circle at center, #1a1a24 0%, #050505 100%);
            font-family: 'Outfit', sans-serif;
            color: #ffffff;
            overflow: hidden;
        }

        .workspace {
            position: relative;
            width: 840px;
            height: 600px;
            border-radius: 20px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.8), 0 0 20px rgba(0, 229, 255, 0.1);
            background-color: #000;
            overflow: hidden;
            border: 1px solid var(--borda-hud);
        }

        canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .input_video {
            display: none;
        }

        .hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 30px;
            box-sizing: border-box;
            background: linear-gradient(180deg, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0) 20%, rgba(0,0,0,0) 80%, rgba(0,0,0,0.6) 100%);
        }

        .painel {
            background: var(--fundo-hud);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 20px 30px;
            border-radius: 16px;
            border: 1px solid var(--borda-hud);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            width: fit-content;
            transition: all 0.3s ease;
        }

        .painel-topo {
            display: flex;
            gap: 20px;
            justify-content: space-between;
            align-items: flex-start;
            width: 100%;
        }

        .contador-box h1 {
            margin: 0 0 8px 0;
            font-size: 14px;
            color: #8bb4b8;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 700;
        }

        .contador-valor {
            font-size: 64px;
            font-weight: 900;
            margin: 0;
            color: var(--cor-primaria);
            line-height: 1;
            text-shadow: 0 0 20px rgba(0, 229, 255, 0.4);
            display: inline-block;
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); color: var(--cor-ok); text-shadow: 0 0 30px var(--cor-ok); }
            100% { transform: scale(1); }
        }

        .animar-pop {
            animation: pop 0.5s ease-out;
        }

        .status-box h2 {
            margin: 0 0 15px 0;
            font-size: 14px;
            font-weight: 700;
            color: #8bb4b8;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .fase-destaque {
            font-weight: 900;
            color: #111;
            background: var(--cor-primaria);
            padding: 6px 14px;
            border-radius: 8px;
            margin-left: 8px;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.4);
            transition: all 0.3s ease;
        }

        .fase-destaque.fase-descendo {
            background: var(--cor-secundaria);
            box-shadow: 0 0 15px rgba(255, 61, 0, 0.4);
            color: white;
        }

        .indicadores {
            display: flex;
            gap: 20px;
            font-size: 15px;
            font-weight: 600;
        }

        .mao-status {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .bolinha {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background-color: transparent;
            border: 2px solid var(--borda-hud);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .bolinha.ok {
            background-color: var(--cor-ok);
            border-color: var(--cor-ok);
            box-shadow: 0 0 15px var(--cor-ok);
            transform: scale(1.2);
        }

        .texto-status {
            color: #e0e0e0;
        }

        .controles {
            align-self: center;
            pointer-events: auto;
        }

        button {
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 100%);
            color: white;
            border: 1px solid var(--borda-hud);
            padding: 14px 32px;
            font-size: 14px;
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-radius: 12px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        button:hover {
            background: var(--cor-primaria);
            color: #000;
            border-color: var(--cor-primaria);
            box-shadow: 0 0 25px rgba(0, 229, 255, 0.5);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(1px);
        }

        .carregando-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 18px;
            font-weight: 700;
            color: var(--cor-primaria);
            z-index: 0;
            letter-spacing: 3px;
            animation: pulse-op 1.5s infinite alternate;
        }

        @keyframes pulse-op {
            from { opacity: 0.3; }
            to { opacity: 1; }
        }
    </style>
</head>

<body>

    <video class="input_video"></video>
    
    <div class="workspace">
        <div class="carregando-msg" id="msg-carregando">INICIANDO CÂMERA...</div>
        <canvas class="output_canvas" width="840" height="600"></canvas>

        <div class="hud" id="hud" style="opacity: 0; transition: opacity 1s">
            <div class="painel-topo">
                <div class="painel contador-box">
                    <h1>Sessão 67</h1>
                    <div class="contador-valor" id="ui-contador">0</div>
                </div>

                <div class="painel status-box">
                    <h2>Movimento: <span class="fase-destaque" id="ui-fase">SUBIR MÃOS</span></h2>
                    <div class="indicadores">
                        <div class="mao-status">
                            <div class="bolinha" id="bola-esq"></div>
                            <span class="texto-status">Mão 1</span>
                        </div>
                        <div class="mao-status">
                            <div class="bolinha" id="bola-dir"></div>
                            <span class="texto-status">Mão 2</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="controles">
                <button id="btn-reiniciar">Zerar Sistema</button>
            </div>
        </div>
    </div>

    <script>
        // Elementos do DOM
        const videoElement = document.querySelector('.input_video');
        const canvasElement = document.querySelector('.output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const msgCarregando = document.getElementById('msg-carregando');
        const hud = document.getElementById('hud');

        // Elementos da UI
        const uiContador = document.getElementById('ui-contador');
        const uiFase = document.getElementById('ui-fase');
        const bolaEsq = document.getElementById('bola-esq');
        const bolaDir = document.getElementById('bola-dir');
        const btnReiniciar = document.getElementById('btn-reiniciar');

        // Estado da Detecção
        let contador67 = 0;
        let faseAtual = 'SUBINDO';
        let tocouMao1 = false;
        let tocouMao2 = false;

        // Limites ajustados para ser perceptível e confortável
        const LIMITE_SUPERIOR = 0.35;
        const LIMITE_INFERIOR = 0.65;

        btnReiniciar.addEventListener('click', () => {
            contador67 = 0;
            faseAtual = 'SUBINDO';
            tocouMao1 = false;
            tocouMao2 = false;
            uiContador.innerText = '0';
            atualizarUI();
        });

        function atualizarUI() {
            // Anima o contador apenas se ele mudar (e for maior que 0)
            if (uiContador.innerText !== contador67.toString()) {
                uiContador.innerText = contador67;
                uiContador.classList.remove('animar-pop');
                void uiContador.offsetWidth; // Força recálculo do DOM para reiniciar animação
                uiContador.classList.add('animar-pop');
            }
            
            // Atualiza fase e estilo
            if (faseAtual === 'SUBINDO') {
                uiFase.innerText = 'SUBIR MÃOS';
                uiFase.className = 'fase-destaque';
            } else {
                uiFase.innerText = 'DESCER MÃOS';
                uiFase.className = 'fase-destaque fase-descendo';
            }

            // Atualiza luzes indicadoras (Mão 1 visualmente à esquerda, Mão 2 à direita)
            if (tocouMao1) bolaEsq.classList.add('ok'); else bolaEsq.classList.remove('ok');
            if (tocouMao2) bolaDir.classList.add('ok'); else bolaDir.classList.remove('ok');
        }

        function onResults(results) {
            // Revela a interface quando a câmera começar a mandar frames
            if (hud.style.opacity === '0') {
                hud.style.opacity = '1';
                msgCarregando.style.display = 'none';
            }

            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            // Filtro cinemático escurecendo o vídeo para dar mais contraste ao esqueleto digital e neon
            canvasCtx.fillStyle = 'rgba(0, 0, 0, 0.4)';
            canvasCtx.fillRect(0, 0, canvasElement.width, canvasElement.height);

            // Desenhar Linhas de Alvo
            canvasCtx.lineWidth = 3;
            
            // Linha Guia Superior
            canvasCtx.beginPath();
            canvasCtx.moveTo(0, canvasElement.height * LIMITE_SUPERIOR);
            canvasCtx.lineTo(canvasElement.width, canvasElement.height * LIMITE_SUPERIOR);
            canvasCtx.strokeStyle = faseAtual === 'SUBINDO' ? '#00e5ff' : 'rgba(0, 229, 255, 0.2)';
            canvasCtx.shadowBlur = faseAtual === 'SUBINDO' ? 20 : 0;
            canvasCtx.shadowColor = '#00e5ff';
            canvasCtx.stroke();

            // Linha Guia Inferior
            canvasCtx.beginPath();
            canvasCtx.moveTo(0, canvasElement.height * LIMITE_INFERIOR);
            canvasCtx.lineTo(canvasElement.width, canvasElement.height * LIMITE_INFERIOR);
            canvasCtx.strokeStyle = faseAtual === 'DESCENDO' ? '#ff3d00' : 'rgba(255, 61, 0, 0.2)';
            canvasCtx.shadowBlur = faseAtual === 'DESCENDO' ? 20 : 0;
            canvasCtx.shadowColor = '#ff3d00';
            canvasCtx.stroke();

            canvasCtx.shadowBlur = 0; // Limpa para os próximos desenhos

            // Lógica de Detecção
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                
                // Mapeia até 2 mãos para processar
                let handsData = results.multiHandLandmarks.slice(0, 2);
                
                // Usando a coordenada X para identificar a mão.
                // Isso resolve as inconsistências da mediapipe com mãos invertidas!
                // Mão 1 terá menor X, Mão 2 terá maior X.
                handsData.sort((a, b) => a[9].x - b[9].x);

                handsData.forEach((landmarks, index) => {
                    // Esqueleto cibernético clean
                    drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, { color: 'rgba(255, 255, 255, 0.5)', lineWidth: 3 });
                    drawLandmarks(canvasCtx, landmarks, { color: '#00e5ff', fillColor: '#050505', lineWidth: 2, radius: 4 });

                    // O ponto 9 é a articulação central principal (nó inferior do dedo médio). Super estável.
                    const yMao = landmarks[9].y;
                    const xMao = landmarks[9].x;

                    // Destaca o ponto rastreado
                    canvasCtx.beginPath();
                    canvasCtx.arc(xMao * canvasElement.width, yMao * canvasElement.height, 10, 0, 2 * Math.PI);
                    canvasCtx.fillStyle = 'rgba(0, 229, 255, 0.9)';
                    canvasCtx.shadowBlur = 15;
                    canvasCtx.shadowColor = '#00e5ff';
                    canvasCtx.fill();
                    canvasCtx.shadowBlur = 0;

                    // MOTOR LÓGICO ESTÁVEL
                    if (faseAtual === 'SUBINDO') {
                        if (yMao < LIMITE_SUPERIOR) {
                            if (index === 0) tocouMao1 = true;
                            if (index === 1) tocouMao2 = true;
                        }

                        // As duas concluíram o percurso?
                        if (handsData.length === 2 && tocouMao1 && tocouMao2) {
                            faseAtual = 'DESCENDO';
                            tocouMao1 = false;
                            tocouMao2 = false;
                        }
                    } 
                    else if (faseAtual === 'DESCENDO') {
                        if (yMao > LIMITE_INFERIOR) {
                            if (index === 0) tocouMao1 = true;
                            if (index === 1) tocouMao2 = true;
                        }

                        if (handsData.length === 2 && tocouMao1 && tocouMao2) {
                            contador67++;
                            faseAtual = 'SUBINDO';
                            tocouMao1 = false;
                            tocouMao2 = false;
                        }
                    }
                });
            }

            atualizarUI();
            canvasCtx.restore();
        }

        const hands = new Hands({
            locateFile: (file) => {
                return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
            }
        });

        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.65,
            minTrackingConfidence: 0.65
        });

        hands.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({ image: videoElement });
            },
            width: 840,
            height: 600
        });

        camera.start().catch(err => {
            msgCarregando.innerText = "ERRO AO ACESSAR A CÂMERA.";
            msgCarregando.style.color = "#ff3d00";
            msgCarregando.style.animation = "none";
            console.error(err);
        });
    </script>
</body>

</html>
